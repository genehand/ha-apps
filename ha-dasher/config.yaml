name: Dasher
version: 0.0.5
slug: ha_dasher
description: Filter websocket updates for dashboard entities
url: https://github.com/genehand/ha-dasher
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ports:
  8124/tcp: 8124
ports_description:
  8124/tcp: Port for the proxy server
options:
  ha_host: homeassistant:8123
  entity_filters: []
schema:
  ha_host: str
  entity_filters:
    - str
