name: Dasher
version: 0.1.1
slug: ha_dasher
description: Filter websocket updates for dashboard entities
url: https://github.com/genehand/ha-dasher
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ports:
  8124/tcp: 8124
ports_description:
  8124/tcp: Port for the proxy server
options:
  ha_host: homeassistant:8123
  transparent: true
schema:
  ha_host: str
  transparent: bool
