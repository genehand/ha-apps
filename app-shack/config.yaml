name: Shack
version: 0.4.0
slug: shack
description: HACS Shack - Run HACS integrations outside Home Assistant via MQTT
url: https://github.com/genehand/ha-apps
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
ports:
  8080/tcp: 8080
options:
  mqtt_host: core-mosquitto
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  log_level: INFO
  integration_log_levels:
    custom_components.dreo.pydreo.pydreobasedevice: WARNING
schema:
  mqtt_host: str
  mqtt_port: int
  mqtt_username: str?
  mqtt_password: password?
  log_level: list(DEBUG|INFO|WARNING|ERROR|CRITICAL)
  integration_log_levels:
    match(.+): list(DEBUG|INFO|WARNING|ERROR|CRITICAL)
